workflows:

  # ─── iOS Build ───────────────────────────────────────────────────────────────
  ios-release:
    name: Primo Marble iOS (App Store)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store          # change to 'ad_hoc' for TestFlight/direct install
        bundle_identifier: com.primomarble.daycheckapp
      vars:
        BUNDLE_ID: com.primomarble.daycheckapp
        XCODE_SCHEME: PrimoMarbleApp
      node: v20

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Expo prebuild (iOS)
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/$XCODE_SCHEME.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      # --- Email notification when build finishes ---
      email:
        recipients:
          - your@email.com           # ← change this
        notify:
          success: true
          failure: true

      # --- Uncomment to auto-submit to TestFlight ---
      # app_store_connect:
      #   api_key: $APP_STORE_CONNECT_PRIVATE_KEY
      #   key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
      #   issuer_id: $APP_STORE_CONNECT_ISSUER_ID
      #   submit_to_testflight: true

  # ─── Android Build (kept for reference) ──────────────────────────────────────
  android-release:
    name: Primo Marble Android (APK)
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      node: v20
      java: 17

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Expo prebuild (Android)
        script: npx expo prebuild --platform android --non-interactive

      - name: Build APK
        script: cd android && ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
