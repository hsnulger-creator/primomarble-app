name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    env:
      EXPO_NO_TELEMETRY: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Expo Prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      - name: Fix Swift version in Podfile
        run: |
          python3 -c "
          content = open('ios/Podfile').read()
          patch = '''
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings[\"SWIFT_VERSION\"] = \"5.9\"
              end
            end
          '''
          content = content.replace('react_native_post_install(installer)', 'react_native_post_install(installer)' + patch)
          open('ios/Podfile', 'w').write(content)
          print('Podfile patched successfully')
          "

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Write App Store Connect API key
        env:
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_3CL3588VSB.p8"
          echo "$PRIVATE_KEY_B64" | base64 --decode > "$KEY_PATH"
          echo "KEY_PATH=$KEY_PATH" >> $GITHUB_ENV
          echo "Key written: $(wc -c < "$KEY_PATH") bytes"

      - name: Import distribution certificate
        env:
          DIST_CERT_P12_B64: ${{ secrets.DISTRIBUTION_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
        run: |
          P12_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="signing-$(openssl rand -hex 8)"

          printf '%s' "$DIST_CERT_P12_B64" | base64 --decode > "$P12_PATH"
          echo "P12 size: $(wc -c < "$P12_PATH") bytes"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -P "$DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g)
          echo "Certificate imported successfully"

      - name: Build with fastlane
        run: fastlane ios release

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/output/*.ipa
          retention-days: 30
