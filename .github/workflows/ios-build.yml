name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    env:
      EXPO_NO_TELEMETRY: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Expo Prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Write App Store Connect API key
        env:
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          echo "$PRIVATE_KEY_B64" | base64 --decode > AuthKey_7369S7N8QZ.p8
          echo "File size: $(wc -c < AuthKey_7369S7N8QZ.p8) bytes"
          echo "First line: $(head -1 AuthKey_7369S7N8QZ.p8)"

      - name: Detect workspace and scheme
        run: |
          WORKSPACE=$(ls ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "Using workspace: $WORKSPACE | scheme: $SCHEME"

      - name: Archive iOS app
        run: |
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ios/PrimoMarble.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=K6864D294S \
            -authenticationKeyPath "$PWD/AuthKey_7369S7N8QZ.p8" \
            -authenticationKeyID "7369S7N8QZ" \
            -authenticationKeyIssuerID "cf8f6456-896e-47ed-a844-e20e07e7126f" \
            -allowProvisioningUpdates

      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>K6864D294S</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath ios/PrimoMarble.xcarchive \
            -exportPath ios/output \
            -exportOptionsPlist ExportOptions.plist \
            -authenticationKeyPath "$PWD/AuthKey_7369S7N8QZ.p8" \
            -authenticationKeyID "7369S7N8QZ" \
            -authenticationKeyIssuerID "cf8f6456-896e-47ed-a844-e20e07e7126f" \
            -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/output/*.ipa
          retention-days: 30
