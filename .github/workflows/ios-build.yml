name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    env:
      EXPO_NO_TELEMETRY: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Expo Prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Write App Store Connect API key
        env:
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_3CL3588VSB.p8"
          echo "$PRIVATE_KEY_B64" | base64 --decode > "$KEY_PATH"
          echo "KEY_PATH=$KEY_PATH" >> $GITHUB_ENV
          echo "Key written: $(wc -c < "$KEY_PATH") bytes"

      - name: Create distribution certificate
        run: node .github/scripts/create-dist-cert.js

      - name: Upload p12 as artifact (save this as DISTRIBUTION_CERT_P12 secret)
        uses: actions/upload-artifact@v4
        with:
          name: distribution-cert-p12
          path: ${{ runner.temp }}/distribution.p12
          retention-days: 1

      - name: Build with fastlane
        run: fastlane ios release

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/output/*.ipa
          retention-days: 30
