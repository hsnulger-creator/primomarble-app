name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    env:
      EXPO_NO_TELEMETRY: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Expo Prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Write App Store Connect API key
        env:
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_3CL3588VSB.p8"
          echo "$PRIVATE_KEY_B64" | base64 --decode > "$KEY_PATH"
          echo "KEY_PATH=$KEY_PATH" >> $GITHUB_ENV
          echo "Key written: $(wc -c < "$KEY_PATH") bytes"

      - name: Import distribution certificate
        env:
          DIST_CERT_P12_B64: ${{ secrets.DISTRIBUTION_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
        run: |
          P12_PATH="$RUNNER_TEMP/distribution.p12"
          echo "$DIST_CERT_P12_B64" | base64 --decode > "$P12_PATH"
          echo "P12 size: $(wc -c < "$P12_PATH") bytes"
          security import "$P12_PATH" -P "$DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "" \
            ~/Library/Keychains/login.keychain-db
          echo "Certificate imported successfully"

      - name: Build with fastlane
        run: fastlane ios release

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/output/*.ipa
          retention-days: 30
